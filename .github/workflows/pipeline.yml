name: Meta Ads Automation Pipeline

on:
  schedule:
    # Runs at 9:00, 15:00, and 18:00 IST (UTC +5:30)
    # 09:00 IST = 03:30 UTC
    # 15:00 IST = 09:30 UTC
    # 18:00 IST = 12:30 UTC
    - cron: '30 3,9,12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Credentials File
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > Credentials.json

      - name: Run Meta Pipeline
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          AD_ACCOUNT_ID: ${{ secrets.AD_ACCOUNT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_WORKSHEET_NAME: ${{ secrets.GOOGLE_WORKSHEET_NAME }}
          GOOGLE_CREDENTIALS_FILE: "Credentials.json"
          API_VERSION: "v19.0"
          DEFAULT_START_DATE: "2026-02-28"
        run: python run_all.py
